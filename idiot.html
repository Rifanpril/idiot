<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMU IDIOT!!!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

  body {
    overflow: hidden;
    height: 100vh; width: 100vw;
    animation: bgFlash 0.2s infinite;
    font-family: Impact, sans-serif;
  }

  @keyframes bgFlash {
    0%   { background: red; }
    10%  { background: yellow; }
    20%  { background: lime; }
    30%  { background: cyan; }
    40%  { background: magenta; }
    50%  { background: blue; }
    60%  { background: orange; }
    70%  { background: pink; }
    80%  { background: purple; }
    90%  { background: white; }
    100% { background: red; }
  }

  .txt {
    position: fixed;
    font-size: 40px;
    font-weight: 900;
    text-shadow: 3px 3px 0 #000;
    white-space: nowrap;
    animation: bgFlash 0.1s infinite;
    -webkit-text-stroke: 2px black;
    pointer-events: none;
  }

  /* Cursor palsu yang ngikutin */
  #fakeCursor {
    position: fixed;
    width: 30px; height: 30px;
    background: red;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    border: 3px solid black;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div id="fakeCursor"></div>

<script>
  // ── SUARA "YOU ARE AN IDIOT"
  const audio = new Audio('You are an idiot!! - Zuhuk (youtube).mp3');
  audio.loop = true;

  // Play saat pertama kali disentuh
  document.addEventListener('click', () => {
    audio.play();
    ctx.resume();
  }, { once: true });
  document.addEventListener('touchstart', () => {
    audio.play();
    ctx.resume();
  }, { once: true });

  // ── TULISAN BERGERAK KEMANA-MANA
  const texts = [
    'HAHAHA!!!', 'IDIOT WKWK',
    'KETANGKEP!!!', 'TOLOL',
    'GG EZ!!!', 'KENA PRANK!!!',
    'WKWKWK!!!', '💀💀💀',
    'LOL!!!', 'HEHEHEHE!!!',
    'CUPU!!!', '🤣🤣🤣',
    'SKIP!!!', 'KALAH!!!',
    'ZONK!!!', 'PRANK!!!', 'GOTCHA!!!',
    'EZ CLAP!!!', '😭😭😭',
    'BYE BYE!!!', 'OWNED!!!',
    '🔥🔥🔥', 'AUTO LOSS!!!', 'GAME OVER!!!',
    'HAHA LOSER!!!', 'SAD!!!',
    'YOU ARE AN IDIOT!!!', 'HAHAHAHAHA!!!',
    '😈😈😈', 'GOTCHA!!!', 'REKT!!!',
    'NO ESCAPE!!!', 'GG!!!', 'CAUGHT!!!',
    'TOO SLOW!!!', 'NICE TRY!!!', '🎉🎉🎉',
    'PRANKED!!!', 'L + RATIO!!!', 'WKWKWK!!!',
    'KABUR KEMANA???', '😂💀😂',
  ];

  function spawnText() {
    const el = document.createElement('div');
    el.className = 'txt';
    el.textContent = texts[Math.floor(Math.random() * texts.length)];
    el.style.left = Math.random() * 80 + 'vw';
    el.style.top = Math.random() * 80 + 'vh';
    el.style.fontSize = (Math.random() * 60 + 20) + 'px';
    el.style.transform = `rotate(${Math.random()*60-30}deg)`;
    document.body.appendChild(el);

    // Gerak random
    let x = parseFloat(el.style.left);
    let y = parseFloat(el.style.top);
    let dx = (Math.random() * 4 - 2);
    let dy = (Math.random() * 4 - 2);

    const move = setInterval(() => {
      x += dx; y += dy;
      if (x < 0 || x > 85) dx *= -1;
      if (y < 0 || y > 85) dy *= -1;
      el.style.left = x + 'vw';
      el.style.top = y + 'vh';
    }, 16);
  }

  // Spawn banyak tulisan
  for (let i = 0; i < 40; i++) {
    setTimeout(spawnText, i * 50);
  }

  // ── CURSOR PALSU ngikutin mouse tapi dibikin annoying
  const fakeCursor = document.getElementById('fakeCursor');
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  document.addEventListener('touchmove', e => {
    mx = e.touches[0].clientX;
    my = e.touches[0].clientY;
  });
  setInterval(() => {
    fakeCursor.style.left = (mx + Math.random()*20-10) + 'px';
    fakeCursor.style.top  = (my + Math.random()*20-10) + 'px';
  }, 50);

  // ── TIDAK BISA DITUTUP / BACK
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, null, location.href);
  });

  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Fullscreen paksa saat klik
  document.addEventListener('click', () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  document.addEventListener('touchstart', () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  });

  // ── ANTI CLOSE: kalau mau close tab
  window.onbeforeunload = function() {
    return 'YAKIN MAU KABUR??? 😈';
  };

  // Spawn tulisan baru terus
  setInterval(spawnText, 500);
</script>
</body>
</html>
